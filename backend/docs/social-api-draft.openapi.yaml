# Черновик контракта API для социальных фич (SOCIAL.md, этапы B–E и далее).
# Не подключён к рантайму: в приложении пока нет @fastify/swagger; сверка вручную / будущая генерация клиента.
openapi: 3.0.3
info:
  title: STROITECH Social API (draft)
  version: "0.1.0"
  description: >
    Планируемые маршруты. Префикс API в проде обычно /api (как у текущих /api/users, /api/feed).
servers:
  - url: /api

tags:
  - name: follow
    description: Подписка на профиль (не путать с GET /subscriptions — тариф)
  - name: feed
    description: Лента и посты
  - name: albums
    description: Фотоальбомы профиля
  - name: moderation
    description: Инструменты модератора (верификация и др.)
  - name: communities
    description: Сообщества (открытые группы v1)
  - name: events
    description: События и RSVP (этап L)
  - name: moderation
    description: Жалобы и метрики (этап M)

paths:
  /users/{id}/follow:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [follow]
      summary: Подписаться (идемпотентно; повтор → 200, created=false)
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Новая подписка
        "200":
          description: Уже подписаны
    delete:
      tags: [follow]
      summary: Отписаться (идемпотентно)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /users/{id}/followers:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [follow]
      summary: Список подписчиков (пагинация page/limit)
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK

  /users/{id}/following:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [follow]
      summary: Список аккаунтов, на которых подписан пользователь id
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK

  /users/{id}/follow-status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [follow]
      summary: Текущий пользователь подписан на id?
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      following: { type: boolean }

  /users/recommendations:
    get:
      tags: [follow]
      summary: Кого подписать (регион/роль, сеть подписок, категории объявлений)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 8 }
      responses:
        "200":
          description: OK

  /users/moderation/verification-candidates:
    get:
      tags: [moderation]
      summary: Поиск кандидатов на верификацию (только moderator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: unverifiedOnly
          in: query
          description: По умолчанию true; false — показать всех подходящих по фильтру
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: OK
        "403":
          description: Не модератор

  /users/{id}/verification:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [moderation]
      summary: Выдать или снять верификацию (только moderator); пишет audit
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [granted]
              properties:
                granted: { type: boolean }
                note: { type: string, maxLength: 500 }
      responses:
        "200":
          description: OK
        "403":
          description: Не модератор

  /communities:
    get:
      tags: [communities]
      summary: Список сообществ
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: OK
    post:
      tags: [communities]
      summary: Создать сообщество (создатель — admin)
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: OK

  /communities/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [communities]
      summary: Карточка сообщества + myRole при JWT
      responses:
        "200":
          description: OK
    patch:
      tags: [communities]
      summary: Редактирование (admin сообщества или глобальный moderator)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
    delete:
      tags: [communities]
      summary: Удалить (создатель или глобальный moderator)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /communities/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [communities]
      summary: Участники с ролями
      parameters:
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, default: 30, maximum: 100 }
      responses:
        "200":
          description: OK

  /communities/{id}/albums:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [communities, albums]
      summary: Альбомы, привязанные к сообществу
      responses:
        "200":
          description: OK

  /communities/{id}/join:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [communities]
      summary: Вступить (открытая группа)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /communities/{id}/leave:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [communities]
      summary: Выйти (единственный admin — с ограничениями)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /communities/{id}/members/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [communities]
      summary: Исключить участника (staff сообщества или глобальный moderator)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
    patch:
      tags: [communities]
      summary: Сменить роль moderator|member (только admin сообщества)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /events/reminders/dispatch:
    post:
      tags: [events]
      summary: Отправка in-app напоминаний участникам со статусом «иду» (событие начинается в ближайшие 24 ч)
      description: Заголовок X-Cron-Secret должен совпадать с EVENT_REMINDER_CRON_SECRET; без переменной окружения — 503.
      parameters:
        - name: X-Cron-Secret
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK (data.dispatched — число отправленных)
        "403":
          description: Неверный секрет
        "503":
          description: Не настроено

  /events:
    get:
      tags: [events]
      summary: Список событий (предстоящие / прошедшие)
      parameters:
        - name: when
          in: query
          schema: { type: string, enum: [upcoming, past], default: upcoming }
        - name: communityId
          in: query
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: OK
    post:
      tags: [events]
      summary: Создать событие (при communityId — нужно быть участником сообщества)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [events]
      summary: Карточка + группы участников; myRsvp и canManage при JWT
      responses:
        "200":
          description: OK
    put:
      tags: [events]
      summary: Изменить (создатель, staff сообщества или глобальный moderator)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
    delete:
      tags: [events]
      summary: Удалить
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /events/{id}/rsvp:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [events]
      summary: RSVP (иду / возможно / не иду); для события сообщества — только участники
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [going, maybe, not_going] }
      responses:
        "200":
          description: OK

  /moderation/reports:
    post:
      tags: [moderation]
      summary: Пожаловаться на пост или комментарий ленты
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetType, targetId]
              properties:
                targetType: { type: string, enum: [feed_post, feed_comment] }
                targetId: { type: string, format: uuid }
                details: { type: string, maxLength: 2000 }
      responses:
        "200":
          description: OK
        "409":
          description: Уже есть жалоба от этого пользователя на объект
    get:
      tags: [moderation]
      summary: Очередь жалоб (только moderator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, closed, all], default: pending }
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, default: 30, maximum: 100 }
      responses:
        "200":
          description: OK

  /moderation/reports/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [moderation]
      summary: Закрыть жалобу (только moderator)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [closed] }
      responses:
        "200":
          description: OK

  /moderation/metrics:
    get:
      tags: [moderation]
      summary: Метрики за период (только moderator); format=csv — скачивание файла
      security: [{ bearerAuth: [] }]
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: format
          in: query
          schema: { type: string, enum: [json, csv], default: json }
      responses:
        "200":
          description: JSON или text/csv

  /feed/home:
    get:
      tags: [feed]
      summary: Персональная лента (посты от подписок)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
        - name: tag
          in: query
          description: Фильтр по slug хэштега (нормализованный, без #)
          schema: { type: string }
      responses:
        "200":
          description: OK

  /feed/recommended:
    get:
      tags: [feed]
      summary: Рекомендуемые посты (эвристика v1, опционально)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
        - name: tag
          in: query
          description: Фильтр по slug хэштега
          schema: { type: string }
      responses:
        "200":
          description: OK

  /users/{id}/activity:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [follow]
      summary: Лента активности профиля (объявления, альбомы, прогресс этапов объектов; без дублей стены/статей)
      parameters:
        - $ref: "#/components/parameters/page"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: OK

  /users/{id}/albums:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [albums]
      summary: Список альбомов пользователя
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK

  /albums:
    post:
      tags: [albums]
      summary: Создать альбом (владелец = JWT)
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: OK

  /albums/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [albums]
      summary: Альбом с фотографиями
      responses:
        "200":
          description: OK
    put:
      tags: [albums]
      summary: Обновить альбом (только владелец)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
    delete:
      tags: [albums]
      summary: Удалить альбом (только владелец)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /albums/{id}/photos:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [albums]
      summary: Добавить фото (URL после POST /upload/album)
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: OK

  /albums/{id}/photos/{photoId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: photoId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [albums]
      summary: Удалить фото из альбома
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /albums/{id}/photos/reorder:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [albums]
      summary: Установить порядок фото (массив id)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /upload/album:
    post:
      tags: [albums]
      summary: Загрузка изображения в префикс albums/{userId}/
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK

  /feed/tags/popular:
    get:
      tags: [feed]
      summary: Популярные хэштеги (до 30, по числу привязанных постов)
      responses:
        "200":
          description: OK

  /feed/posts:
    get:
      tags: [feed]
      summary: Список постов (пагинация; kind; authorId; tag — slug без #)
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - name: kind
          in: query
          schema: { type: string, enum: [article, wall, share] }
        - name: authorId
          in: query
          schema: { type: string, format: uuid }
        - name: tag
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
    post:
      tags: [feed]
      summary: Создать пост (статья, стена или репост)
      security: [{ bearerAuth: [] }]
      description: >
        Репост на стену kind=share, поле share { targetType: feed_post | listing | construction_object, targetId },
        опционально body — комментарий (до 2000 символов). Список постов kind=wall включает wall и share.
        Текст может содержать хэштеги (#слово) и токены упоминаний [[mention:uuid]] — после сохранения в ответах
        приходят tags, mentions и mentionUsers.
      responses:
        "201":
          description: Создано

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
